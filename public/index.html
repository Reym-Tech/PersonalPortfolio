<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%PUBLIC_URL%/images/PageIcon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#FFFFFF" />
  <!-- Apply the saved/system theme before first paint so dark mode never flashes white. -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('theme');
        var dark = stored ? stored === 'dark'
          : window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (dark) document.documentElement.classList.add('dark');
      } catch (e) {}
    })();
  </script>
  <meta name="description"
    content="Portfolio of John Remy Gonzales — full-stack web developer and BSIT student. Projects, tech stack, certifications, and resume." />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/images/AppIcon.png" />

  <!-- Open Graph / Facebook / LinkedIn -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://reymtech-portfolio.vercel.app/" />
  <meta property="og:title" content="John Remy Gonzales — Full-Stack Web Developer" />
  <meta property="og:description"
    content="Portfolio of John Remy Gonzales — full-stack web developer and BSIT student. Projects, tech stack, certifications, and resume." />
  <meta property="og:image" content="https://reymtech-portfolio.vercel.app/images/Share-Preview.png" />
  <meta property="og:image:width" content="1731" />
  <meta property="og:image:height" content="909" />
  <meta property="og:site_name" content="John Remy Gonzales" />

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://reymtech-portfolio.vercel.app/" />
  <meta name="twitter:title" content="John Remy Gonzales — Full-Stack Web Developer" />
  <meta name="twitter:description"
    content="Portfolio of John Remy Gonzales — full-stack web developer and BSIT student. Projects, tech stack, certifications, and resume." />
  <meta name="twitter:image" content="https://reymtech-portfolio.vercel.app/images/Share-Preview.png" />
  <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
  <title>John Remy Gonzales — Full-Stack Web Developer</title>
</head>
